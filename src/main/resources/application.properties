# ========================
# App Info
# ========================
spring.application.name=Jammoney

# ========================
# Database (AWS RDS)
# ========================
spring.datasource.url=jdbc:mysql://${DATABASE_HOST}:3306/jammoney
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ========================
# JPA
# ========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ========================
# KIS API (?? ??: ????? ??)
# ========================
kis.app.key=${KIS_APP_KEY}
kis.app.secret=${KIS_APP_SECRET}
kis.base-url=https://openapivts.koreainvestment.com:29443
kis.url.token = /oauth2/tokenP
kis.url.price = /uapi/domestic-stock/v1/quotations/inquire-price
kis.url.stockAskingPrice = /uapi/domestic-stock/v1/quotations/inquire-asking-price-exp-ccn
kis.url.stockmin = /uapi/domestic-stock/v1/quotations/inquire-time-itemchartprice
kis.url.kospi = /uapi/domestic-stock/v1/quotations/inquire-daily-indexchartprice

# ========================
# JWT (?? ??: ????? ??)
# ========================
jwt.secret=${JWT_SECRET}
jwt.access-token-validity-in-seconds=${JWT_ACCESS_TOKEN_VALIDITY_IN_SECONDS}
jwt.refresh-token-validity-in-seconds=${JWT_REFRESH_TOKEN_VALIDITY_IN_SECONDS}

# ========================
# GPT API (?? ??: ????? ??)
# ========================
gpt.api.key=${GPT_API_KEY}
gpt.model=gpt-3.5-turbo
gpt.base-url=https://api.openai.com/v1/chat/completions

# ========================
# AWS ?? ?? (?? ??: ????? ??)
# ========================
cloud.aws.credentials.access-key=${AWS_ACCESS_KEY}
cloud.aws.credentials.secret-key=${AWS_SECRET_KEY}
cloud.aws.region.static=ap-northeast-2
cloud.aws.s3.bucket=jammoney
cloud.aws.s3.base-url=https://jammoney.s3.ap-northeast-2.amazonaws.com/
cloud.aws.stack.auto=false


