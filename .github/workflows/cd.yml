name: Continuous Deployment

on:
  push:
    branches: ["develop"]

jobs:
  deploy:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build & Push Docker image
        run: |
          docker login -u "${{ secrets.DOCKER_USERNAME }}" -p "${{ secrets.DOCKER_PASSWORD }}"
          docker build -t "${{ secrets.DOCKER_USERNAME }}/jammoney:latest" .
          docker push "${{ secrets.DOCKER_USERNAME }}/jammoney:latest"

      - name: Deploy via SSH (write compose on server)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_SSH_PORT }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_KEY }}
          script: |
            set -e

            APP_DIR=~/***
            mkdir -p "$APP_DIR"
            cd "$APP_DIR"

            # docker compose plugin ensure
            if ! docker compose version >/dev/null 2>&1; then
              sudo apt-get update && sudo apt-get install -y docker-compose-plugin
            fi

            # compose file (redis + app)
            cat > docker-compose.yml <<'YAML'
            version: "3.9"
            services:
              redis:
                image: redis:7-alpine
                command: ["redis-server","--appendonly","yes","--appendfsync","everysec","--save",""]
                volumes: [ "redis-data:/data" ]
                restart: unless-stopped
                healthcheck:
                  test: ["CMD","redis-cli","ping"]
                  interval: 10s
                  timeout: 5s
                  retries: 10

              app:
                image: ${APP_IMAGE}
                depends_on:
                  redis:
                    condition: service_healthy
                environment:
                  SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
                  SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
                  SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
                  SPRING_DATASOURCE_DRIVER_CLASS_NAME: com.mysql.cj.jdbc.Driver
                  SPRING_JPA_HIBERNATE_DDL_AUTO: update
                  SPRING_DATA_REDIS_HOST: redis
                  SPRING_DATA_REDIS_PORT: 6379
                  JWT_SECRET: ${JWT_SECRET}
                  JWT_ACCESS_TOKEN_VALIDITY_IN_SECONDS: ${JWT_ACCESS_TOKEN_VALIDITY_IN_SECONDS}
                  JWT_REFRESH_TOKEN_VALIDITY_IN_SECONDS: ${JWT_REFRESH_TOKEN_VALIDITY_IN_SECONDS}
                  KIS_APP_KEY: ${KIS_APP_KEY}
                  KIS_APP_SECRET: ${KIS_APP_SECRET}
                  GPT_API_KEY: ${GPT_API_KEY}
                  AWS_ACCESS_KEY: ${AWS_ACCESS_KEY}
                  AWS_SECRET_KEY: ${AWS_SECRET_KEY}
                ports: [ "8080:8080" ]
                restart: unless-stopped

            volumes: { redis-data: {} }
            YAML

            # .env (Secrets 주입)
            cat > .env <<'ENVVARS'
            APP_IMAGE=${{ secrets.DOCKER_USERNAME }}/jammoney:latest
            SPRING_DATASOURCE_URL=jdbc:mysql://${{ secrets.DATABASE_HOST }}:${{ secrets.DATABASE_PORT }}/${{ secrets.DATABASE_NAME }}
            SPRING_DATASOURCE_USERNAME=${{ secrets.DATABASE_USERNAME }}
            SPRING_DATASOURCE_PASSWORD=${{ secrets.DATABASE_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_ACCESS_TOKEN_VALIDITY_IN_SECONDS=${{ secrets.JWT_ACCESS_TOKEN_VALIDITY_IN_SECONDS }}
            JWT_REFRESH_TOKEN_VALIDITY_IN_SECONDS=${{ secrets.JWT_REFRESH_TOKEN_VALIDITY_IN_SECONDS }}
            KIS_APP_KEY=${{ secrets.KIS_APP_KEY }}
            KIS_APP_SECRET=${{ secrets.KIS_APP_SECRET }}
            GPT_API_KEY=${{ secrets.GPT_API_KEY }}
            AWS_ACCESS_KEY=${{ secrets.AWS_ACCESS_KEY }}
            AWS_SECRET_KEY=${{ secrets.AWS_SECRET_KEY }}
            ENVVARS

            docker login -u "${{ secrets.DOCKER_USERNAME }}" -p "${{ secrets.DOCKER_PASSWORD }}"
            docker compose pull app || true
            docker compose up -d
            docker compose ps
