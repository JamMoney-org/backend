name: Continuous Deployment

on:
  push:
    branches: ["develop"]

concurrency:
  group: cd-deploy-develop
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        # 빌드 컨텍스트에 전체 리포지토리 필요 시 fetch-depth 0 권장
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build & Push Docker image
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
          docker build -t "${{ secrets.DOCKER_USERNAME }}/jammoney:latest" .
          docker push "${{ secrets.DOCKER_USERNAME }}/jammoney:latest"

      - name: Deploy via SSH (write compose on server)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_SSH_PORT }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_KEY }}
          command_timeout: 10m
          script: |
            set -e

            # 0) 작업 디렉터리 (명확한 이름 권장)
            APP_DIR="$HOME/jammoney"
            mkdir -p "$APP_DIR"
            cd "$APP_DIR"

            # 1) docker compose 준비 (v2 우선, 불가시 바이너리 설치, 최후엔 v1)
            ensure_compose() {
              if docker compose version >/dev/null 2>&1; then return 0; fi

              if command -v apt-get >/dev/null 2>&1; then
                sudo apt-get update -y && sudo apt-get install -y docker-compose-plugin || true
              elif command -v dnf >/dev/null 2>&1; then
                sudo dnf install -y docker-compose-plugin || true
              elif command -v yum >/dev/null 2>&1; then
                sudo yum install -y docker-compose-plugin || true
              elif command -v apk >/dev/null 2>&1; then
                sudo apk add --no-cache docker-cli-compose || true
              elif command -v zypper >/dev/null 2>&1; then
                sudo zypper --non-interactive install docker-compose-plugin || true
              fi

              if docker compose version >/dev/null 2>&1; then return 0; fi

              # 패키지 실패 → v2 바이너리 직접 설치
              COMPOSE_VERSION="v2.30.3"
              DEST="/usr/local/lib/docker/cli-plugins/docker-compose"
              OS=$(uname -s | tr '[:upper:]' '[:lower:]')
              ARCH=$(uname -m)
              sudo mkdir -p "$(dirname "$DEST")"
              sudo curl -fsSL "https://github.com/docker/compose/releases/download/${COMPOSE_VERSION}/docker-compose-${OS}-${ARCH}" -o "$DEST"
              sudo chmod +x "$DEST"

              # 최후: v1 존재 확인
              if ! docker compose version >/dev/null 2>&1 && ! command -v docker-compose >/dev/null 2>&1; then
                echo "docker compose(v2) 설치 실패했고, docker-compose(v1)도 없음" >&2
                exit 1
              fi
            }
            ensure_compose

            # docker compose 또는 docker-compose 선택자
            if docker compose version >/dev/null 2>&1; then
              DC="docker compose"
            else
              DC="docker-compose"
            fi

            # 2) compose 파일 작성 (v2 권고에 따라 version 키 제거)
            cat > docker-compose.yml <<'YAML'
            services:
              redis:
                image: redis:7-alpine
                command: ["redis-server","--appendonly","yes","--appendfsync","everysec","--save",""]
                volumes: [ "redis-data:/data" ]
                restart: unless-stopped
                healthcheck:
                  test: ["CMD","redis-cli","ping"]
                  interval: 10s
                  timeout: 5s
                  retries: 10

              app:
                image: ${APP_IMAGE}
                depends_on:
                  redis:
                    condition: service_healthy
                environment:
                  SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
                  SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
                  SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
                  SPRING_DATASOURCE_DRIVER_CLASS_NAME: com.mysql.cj.jdbc.Driver
                  SPRING_JPA_HIBERNATE_DDL_AUTO: update
                  SPRING_DATA_REDIS_HOST: redis
                  SPRING_DATA_REDIS_PORT: 6379
                  JWT_SECRET: ${JWT_SECRET}
                  JWT_ACCESS_TOKEN_VALIDITY_IN_SECONDS: ${JWT_ACCESS_TOKEN_VALIDITY_IN_SECONDS}
                  JWT_REFRESH_TOKEN_VALIDITY_IN_SECONDS: ${JWT_REFRESH_TOKEN_VALIDITY_IN_SECONDS}
                  KIS_APP_KEY: ${KIS_APP_KEY}
                  KIS_APP_SECRET: ${KIS_APP_SECRET}
                  GPT_API_KEY: ${GPT_API_KEY}
                  AWS_ACCESS_KEY: ${AWS_ACCESS_KEY}
                  AWS_SECRET_KEY: ${AWS_SECRET_KEY}
                ports: [ "8080:8080" ]
                restart: unless-stopped

            volumes: { redis-data: {} }
            YAML

            # 3) .env 작성 (서버에만 저장)
            cat > .env <<'ENVVARS'
            APP_IMAGE=${{ secrets.DOCKER_USERNAME }}/jammoney:latest
            SPRING_DATASOURCE_URL=jdbc:mysql://${{ secrets.DATABASE_HOST }}:${{ secrets.DATABASE_PORT }}/${{ secrets.DATABASE_NAME }}
            SPRING_DATASOURCE_USERNAME=${{ secrets.DATABASE_USERNAME }}
            SPRING_DATASOURCE_PASSWORD=${{ secrets.DATABASE_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_ACCESS_TOKEN_VALIDITY_IN_SECONDS=${{ secrets.JWT_ACCESS_TOKEN_VALIDITY_IN_SECONDS }}
            JWT_REFRESH_TOKEN_VALIDITY_IN_SECONDS=${{ secrets.JWT_REFRESH_TOKEN_VALIDITY_IN_SECONDS }}
            KIS_APP_KEY=${{ secrets.KIS_APP_KEY }}
            KIS_APP_SECRET=${{ secrets.KIS_APP_SECRET }}
            GPT_API_KEY=${{ secrets.GPT_API_KEY }}
            AWS_ACCESS_KEY=${{ secrets.AWS_ACCESS_KEY }}
            AWS_SECRET_KEY=${{ secrets.AWS_SECRET_KEY }}
            ENVVARS

            # 4) docker login (권장 방식)
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

            # 5) 배포 - 프로젝트명 강제 지정(빈 프로젝트명 오류 방지)
            PROJECT_NAME="jammoney"
            $DC -p "$PROJECT_NAME" pull app || true
            $DC -p "$PROJECT_NAME" up -d
            $DC -p "$PROJECT_NAME" ps
